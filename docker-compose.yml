version: '3.8'

services:
  app:
    image: registry.cn-hangzhou.aliyuncs.com/registry_public/scientific-parenting:latest
    container_name: scientific-parenting
    ports:
      - "3000:3000"
    volumes:
      - app-data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  app-data:
    driver: local
